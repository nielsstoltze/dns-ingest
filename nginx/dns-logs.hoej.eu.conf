# dns-logs.hoej.eu — Strata Logging Service HTTPS sink (gzip JSON batches).
# Drops into chost11 nginx-tls services.conf alongside the other internal
# *.hoej.eu vhosts.

server {
    listen 443 ssl;
    server_name dns-logs.hoej.eu;

    # Wildcard hoej.eu cert is mounted by the nginx-tls container.
    # body cap: SLS batches are <= 2.25 MiB compressed per docs; cap at 16 MiB.
    client_max_body_size 16M;

    # Keep gzip-encoded payloads opaque end-to-end — the receiver
    # decompresses itself.
    proxy_request_buffering off;
    proxy_http_version 1.1;

    location = /v1/ingest {
        proxy_pass http://100.67.4.81:8093/v1/ingest;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 30s;
    }

    location = /health {
        proxy_pass http://100.67.4.81:8093/health;
        proxy_set_header Host $host;
    }

    # Everything else returns 404 — this is an API sink, not a UI.
    location / { return 404; }
}
